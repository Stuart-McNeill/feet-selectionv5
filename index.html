<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Foot Engine v5</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0c; }
        canvas { display: block; touch-action: none; }
        /* Hide all original UI - Expo will handle the buttons */
        #ui-layer, .panel, .controls, #coords, #loading { display: none !important; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, leftFoot, rightFoot, currentFootModel;
        let isRotating = false;
        let markerGroup = new THREE.Group();
        const loader = new THREE.GLTFLoader();

        // The absolute path to your GitHub assets
        const ASSET_PATH = "https://stuart-mcneill.github.io/feet-selectionv4/assets/models/";

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0c);
            scene.add(markerGroup);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            const directional = new THREE.DirectionalLight(0xffffff, 1.2);
            directional.position.set(5, 10, 7);
            scene.add(ambient, directional);

            // Load Models
            loader.load(ASSET_PATH + 'left_foot.glb', (gltf) => {
                leftFoot = gltf.scene;
                leftFoot.visible = false;
                scene.add(leftFoot);
            });

            loader.load(ASSET_PATH + 'right_foot.glb', (gltf) => {
                rightFoot = gltf.scene;
                rightFoot.visible = false;
                scene.add(rightFoot);
            });

            animate();
        }

        // --- Logic to get Region Name (Restored from your v4) ---
        function getRegionName(meshName) {
            if (!meshName) return "Unknown Area";
            // Cleaning up common GLTF naming conventions
            let name = meshName.replace(/_/g, ' ').replace(/[0-9]/g, '').trim();
            // Capitalize
            return name.charAt(0).toUpperCase() + name.slice(1);
        }

        // --- Mobile Command Handler ---
        window.handleMobileCommand = (jsonString) => {
            const data = JSON.parse(jsonString);
            switch(data.command) {
                case 'SELECT_SIDE':
                    if (!leftFoot || !rightFoot) return;
                    leftFoot.visible = (data.value === 'left');
                    rightFoot.visible = (data.value === 'right');
                    currentFootModel = (data.value === 'left') ? leftFoot : rightFoot;
                    clearMarkers();
                    break;
                case 'TOGGLE_ROTATE':
                    isRotating = !isRotating;
                    break;
                case 'UNDO':
                    if (markerGroup.children.length > 0) {
                        markerGroup.remove(markerGroup.children[markerGroup.children.length - 1]);
                        notifyApp("UPDATE", markerGroup.children.length);
                    }
                    break;
                case 'CLEAR':
                    clearMarkers();
                    break;
            }
        };

        function clearMarkers() {
            while(markerGroup.children.length > 0) markerGroup.remove(markerGroup.children[0]);
            notifyApp("UPDATE", 0);
        }

        function notifyApp(type, count, region = "") {
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({ type, count, region }));
            }
        }

        // --- Raycasting / Interaction ---
        window.addEventListener('click', (event) => {
            if (!currentFootModel) return;

            const mouse = new THREE.Vector2(
                (event.clientX / window.innerWidth) * 2 - 1,
                -(event.clientY / window.innerHeight) * 2 + 1
            );

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(currentFootModel, true);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                const region = getRegionName(intersect.object.name);
                
                // Add visual marker
                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(0.06),
                    new THREE.MeshBasicMaterial({ color: 0x00f2ff })
                );
                dot.position.copy(intersect.point);
                markerGroup.add(dot);

                notifyApp("MARK_ADDED", markerGroup.children.length, region);
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if (isRotating && currentFootModel) {
                currentFootModel.rotation.y += 0.01;
                markerGroup.rotation.y += 0.01;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
