<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Foot Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0c; }
        canvas { display: block; touch-action: none; }
        /* Hide all original UI elements */
        #ui-layer, .panel, .controls, #coords { display: none !important; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, leftFoot, rightFoot, currentFootModel;
        let rotationEnabled = false;
        let markerGroup = new THREE.Group();
        let markerLogs = [];

        // --- Initialization ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0c);
            scene.add(markerGroup);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 7.5);
            scene.add(directionalLight);

            const loader = new THREE.GLTFLoader();
            // Using absolute paths to ensure assets load regardless of where HTML is hosted
            const baseUrl = "https://stuart-mcneill.github.io/feet-selectionv4/assets/models/";
            
            loader.load(baseUrl + 'left_foot.glb', (gltf) => {
                leftFoot = gltf.scene;
                leftFoot.visible = false;
                scene.add(leftFoot);
            });

            loader.load(baseUrl + 'right_foot.glb', (gltf) => {
                rightFoot = gltf.scene;
                rightFoot.visible = false;
                scene.add(rightFoot);
            });

            animate();
        }

        // --- Bridge Commands (Called by Expo) ---
        window.handleMobileCommand = (dataString) => {
            const data = JSON.parse(dataString);
            
            switch(data.command) {
                case 'SELECT_SIDE':
                    selectFoot(data.value);
                    break;
                case 'TOGGLE_ROTATION':
                    rotationEnabled = !rotationEnabled;
                    break;
                case 'UNDO':
                    undoLastMarker();
                    break;
                case 'CLEAR':
                    clearMarkers();
                    break;
            }
        };

        function selectFoot(side) {
            if (!leftFoot || !rightFoot) return;
            leftFoot.visible = (side === 'left');
            rightFoot.visible = (side === 'right');
            currentFootModel = (side === 'left') ? leftFoot : rightFoot;
            clearMarkers(); // Auto-clear when switching feet
        }

        function undoLastMarker() {
            if (markerGroup.children.length > 0) {
                markerGroup.remove(markerGroup.children[markerGroup.children.length - 1]);
                markerLogs.pop();
                notifyApp();
            }
        }

        function clearMarkers() {
            while(markerGroup.children.length > 0) {
                markerGroup.remove(markerGroup.children[0]);
            }
            markerLogs = [];
            notifyApp();
        }

        function notifyApp() {
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({
                    type: 'STATE_UPDATE',
                    markerCount: markerLogs.length
                }));
            }
        }

        // --- Interaction Logic ---
        window.addEventListener('click', (event) => {
            if (!currentFootModel) return;

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2(
                (event.clientX / window.innerWidth) * 2 - 1,
                -(event.clientY / window.innerHeight) * 2 + 1
            );

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(currentFootModel, true);

            if (intersects.length > 0) {
                const point = intersects[0].point;
                const marker = new THREE.Mesh(
                    new THREE.SphereGeometry(0.05),
                    new THREE.MeshBasicMaterial({ color: 0x00f2ff })
                );
                marker.position.copy(point);
                markerGroup.add(marker);
                markerLogs.push(point);
                notifyApp();
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if (rotationEnabled && currentFootModel) {
                currentFootModel.rotation.y += 0.01;
                markerGroup.rotation.y += 0.01;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
