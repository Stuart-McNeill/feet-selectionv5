<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Engine V4-Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0c; }
        canvas { display: block; touch-action: none; }
        #ui-layer, .panel, .controls, #coords { display: none !important; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, leftFoot, rightFoot, currentFoot;
        let interactionMode = 'rotate'; // 'rotate' or 'mark'
        let markerGroup = new THREE.Group();

        const urls = {
            left: "https://stuart-mcneill.github.io/3Dfootselection/Leftfoot.glb",
            right: "https://stuart-mcneill.github.io/feet-selection/RightFoot.glb"
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0c);
            scene.add(markerGroup);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 7.5);
            scene.add(sun);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const loader = new THREE.GLTFLoader();
            loader.load(urls.left, (g) => { leftFoot = g.scene; leftFoot.visible = false; scene.add(leftFoot); });
            loader.load(urls.right, (g) => { rightFoot = g.scene; rightFoot.visible = false; scene.add(rightFoot); });

            animate();
        }

        window.handleMobileCommand = (json) => {
            const data = JSON.parse(json);
            if (data.action === 'SELECT') {
                leftFoot.visible = (data.side === 'left');
                rightFoot.visible = (data.side === 'right');
                currentFoot = (data.side === 'left') ? leftFoot : rightFoot;
            }
            if (data.action === 'SET_MODE') {
                interactionMode = data.mode;
                controls.enabled = (data.mode === 'rotate');
            }
            if (data.action === 'UNDO') {
                markerGroup.remove(markerGroup.children[markerGroup.children.length-1]);
                sendUpdate();
            }
            if (data.action === 'CLEAR') {
                while(markerGroup.children.length > 0) markerGroup.remove(markerGroup.children[0]);
                sendUpdate();
            }
        };

        function sendUpdate(region = "None") {
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({
                    count: markerGroup.children.length,
                    region: region
                }));
            }
        }

        window.addEventListener('pointerup', (e) => {
            if (interactionMode !== 'mark' || !currentFoot) return;
            
            const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(currentFoot, true);

            if (hits.length > 0) {
                const marker = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({ color: 0x00f2ff }));
                marker.position.copy(hits[0].point);
                markerGroup.add(marker);
                
                let name = hits[0].object.name.replace(/Left foot - |Right foot - |_/gi, " ").trim();
                sendUpdate(name || "Surface");
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
