<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Engine V4-Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0c; }
        canvas { display: block; touch-action: none; }
        /* Hide original V4 UI elements so Expo can take over */
        #ui-layer, .panel, .controls, #coords, #loading { display: none !important; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, leftFoot, rightFoot, currentFoot;
        let markerGroup = new THREE.Group();
        const loader = new THREE.GLTFLoader();

        // Exact URLs from your V4
        const urls = {
            left: "https://stuart-mcneill.github.io/3Dfootselection/Leftfoot.glb",
            right: "https://stuart-mcneill.github.io/feet-selection/RightFoot.glb"
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0c);
            scene.add(markerGroup);

            // V4 Camera View
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // V4 Lighting Setup
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0xffffff, 1);
            directional.position.set(5, 10, 7.5);
            scene.add(directional);

            // OrbitControls for Rotation/Zoom
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Load Models with V4 scaling
            loader.load(urls.left, (gltf) => {
                leftFoot = gltf.scene;
                leftFoot.visible = false;
                scene.add(leftFoot);
            });

            loader.load(urls.right, (gltf) => {
                rightFoot = gltf.scene;
                rightFoot.visible = false;
                scene.add(rightFoot);
            });

            animate();
        }

        window.handleMobileCommand = (json) => {
            const data = JSON.parse(json);
            switch(data.action) {
                case 'SELECT':
                    if (!leftFoot || !rightFoot) return;
                    leftFoot.visible = (data.side === 'left');
                    rightFoot.visible = (data.side === 'right');
                    currentFoot = (data.side === 'left') ? leftFoot : rightFoot;
                    break;
                case 'UNDO':
                    if (markerGroup.children.length > 0) {
                        markerGroup.remove(markerGroup.children[markerGroup.children.length - 1]);
                        sendUpdate();
                    }
                    break;
                case 'CLEAR':
                    while(markerGroup.children.length > 0) markerGroup.remove(markerGroup.children[0]);
                    sendUpdate();
                    break;
            }
        };

        function sendUpdate(region = "None") {
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({
                    count: markerGroup.children.length,
                    region: region
                }));
            }
        }

        // Improved Interaction for Mobile (Prevents marking while rotating)
        let isDragging = false;
        window.addEventListener('touchstart', () => isDragging = false);
        window.addEventListener('touchmove', () => isDragging = true);
        window.addEventListener('touchend', (e) => {
            if (isDragging || !currentFoot) return;
            
            const touch = e.changedTouches[0];
            const mouse = new THREE.Vector2(
                (touch.clientX / window.innerWidth) * 2 - 1,
                -(touch.clientY / window.innerHeight) * 2 + 1
            );

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(currentFoot, true);

            if (hits.length > 0) {
                const marker = new THREE.Mesh(
                    new THREE.SphereGeometry(0.04), // V4 Marker Size
                    new THREE.MeshBasicMaterial({ color: 0x00f2ff })
                );
                marker.position.copy(hits[0].point);
                markerGroup.add(marker);
                
                let name = hits[0].object.name.replace(/Left foot - |Right foot - |_/gi, " ").trim();
                sendUpdate(name || "Surface");
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
