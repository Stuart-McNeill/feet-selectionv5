// --- CORE SYSTEM ---
let currentFoot = 'left';
let currentModel = null;
let markerLogs = [];
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0c);
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0.5, 0.5, 1.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const markerGroup = new THREE.Group();
scene.add(markerGroup);

const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 2);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

const loader = new GLTFLoader();
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function addMarker(pos, region) {
    if (interactionMode === 'mark') {
        const marker = new THREE.Mesh(
            new THREE.SphereGeometry(0.02), // Red Dot
            new THREE.MeshBasicMaterial({ color: 0xff0000 }) 
        );
        marker.position.copy(pos);
        markerGroup.add(marker);
        
        markerLogs.push({ region, x: pos.x.toFixed(3), y: pos.y.toFixed(3), z: pos.z.toFixed(3) });
        
        const cleanRegionName = region.replace(/Left foot - |Right foot - /g, "");
        document.getElementById("coords").textContent = cleanRegionName;

        // Bridge to Expo App
        if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(JSON.stringify({
                count: markerGroup.children.length,
                region: cleanRegionName
            }));
        }
    }
}

function switchModel(side) {
    currentFoot = side;
    
    // --- YOUR GITHUB PATHS RESTORED HERE ---
    const modelPath = side === 'left' 
        ? 'https://raw.githubusercontent.com/msh76/Foot/main/left_foot_centered.glb' 
        : 'https://raw.githubusercontent.com/msh76/Foot/main/right_foot_centered.glb';

    if (currentModel) scene.remove(currentModel);
    while(markerGroup.children.length > 0) markerGroup.remove(markerGroup.children[0]);
    markerLogs = [];
    document.getElementById("coords").textContent = "Region: None";

    loader.load(modelPath, (gltf) => {
        currentModel = gltf.scene;
        scene.add(currentModel);
        
        // Setup collision boxes
        PRESET_REGIONS.filter(r => r.name.toLowerCase().includes(side)).forEach(data => {
            const box = new THREE.Mesh(
                new THREE.BoxGeometry(1, 1, 1),
                new THREE.MeshBasicMaterial({ visible: false })
            );
            box.position.set(...data.pos);
            box.rotation.set(...data.rot);
            box.scale.set(...data.scale);
            box.userData = { regionName: data.name };
            currentModel.add(box);
        });
    });
}

function onTouch(event) {
    if (interactionMode !== 'mark') return;
    const clientX = event.touches ? event.touches[0].clientX : event.clientX;
    const clientY = event.touches ? event.touches[0].clientY : event.clientY;
    
    mouse.x = (clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(currentModel.children, true);
    
    if (intersects.length > 0) {
        const hit = intersects.find(i => i.object.userData.regionName);
        if (hit) addMarker(hit.point, hit.object.userData.regionName);
    }
}

// --- MOBILE COMMAND RECEIVER ---
window.handleMobileCommand = (json) => {
    const data = JSON.parse(json);
    if (data.action === 'SELECT') switchModel(data.side);
    if (data.action === 'UNDO') {
        if (markerGroup.children.length > 0) {
            markerGroup.remove(markerGroup.children[markerGroup.children.length - 1]);
            markerLogs.pop();
        }
    }
    if (data.action === 'CLEAR') {
        while(markerGroup.children.length > 0) markerGroup.remove(markerGroup.children[0]);
        markerLogs = [];
        if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(JSON.stringify({ count: 0, region: "CLEARED" }));
    }
    if (data.action === 'SET_MODE') {
        interactionMode = data.mode;
        controls.enabled = (data.mode === 'rotate');
    }
};

window.addEventListener('mousedown', onTouch);
window.addEventListener('touchstart', onTouch);
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

switchModel('left');
animate();
