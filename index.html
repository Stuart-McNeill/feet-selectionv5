<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Engine v5</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0c; }
        canvas { display: block; touch-action: none; }
        /* Hide all internal HTML UI - Expo will handle the interface */
        #ui-layer, button, .panel, #coords { display: none !important; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls, leftFoot, rightFoot, currentFoot;
        let markerGroup = new THREE.Group();
        const loader = new THREE.GLTFLoader();

        const modelUrls = {
            left: "https://stuart-mcneill.github.io/3Dfootselection/Leftfoot.glb",
            right: "https://stuart-mcneill.github.io/feet-selection/RightFoot.glb"
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0c);
            scene.add(markerGroup);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // --- Unified Lighting (Fixes Right Foot Dullness) ---
            const ambient = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(5, 10, 7.5);
            scene.add(sun);
            const rimLight = new THREE.PointLight(0x00f2ff, 0.6);
            rimLight.position.set(-5, 2, -5);
            scene.add(rimLight);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const loadModel = (url, side) => {
                loader.load(url, (gltf) => {
                    const model = gltf.scene;
                    
                    // Normalize Size so they match perfectly
                    const box = new THREE.Box3().setFromObject(model);
                    const size = box.getSize(new THREE.Vector3()).length();
                    const scale = 3.5 / size;
                    model.scale.set(scale, scale, scale);
                    
                    // Force material update to ensure brightness match
                    model.traverse(n => {
                        if (n.isMesh) {
                            n.material.emissiveIntensity = 0.2;
                            n.material.needsUpdate = true;
                        }
                    });

                    model.visible = false;
                    scene.add(model);
                    if (side === 'left') leftFoot = model;
                    else rightFoot = model;
                });
            };

            loadModel(modelUrls.left, 'left');
            loadModel(modelUrls.right, 'right');
            animate();
        }

        window.handleMobileCommand = (json) => {
            const data = JSON.parse(json);
            switch(data.action) {
                case 'SELECT':
                    if (!leftFoot || !rightFoot) return;
                    leftFoot.visible = (data.side === 'left');
                    rightFoot.visible = (data.side === 'right');
                    currentFoot = (data.side === 'left') ? leftFoot : rightFoot;
                    controls.reset();
                    break;
                case 'RESET_CAM': controls.reset(); break;
                case 'UNDO':
                    if (markerGroup.children.length > 0) {
                        markerGroup.remove(markerGroup.children[markerGroup.children.length - 1]);
                        sendUpdate();
                    }
                    break;
                case 'CLEAR':
                    while(markerGroup.children.length > 0) markerGroup.remove(markerGroup.children[0]);
                    sendUpdate();
                    break;
            }
        };

        function sendUpdate(region = "None") {
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({
                    count: markerGroup.children.length,
                    region: region
                }));
            }
        }

        window.addEventListener('click', (e) => {
            if (!currentFoot) return;
            const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(currentFoot, true);

            if (hits.length > 0) {
                const marker = new THREE.Mesh(new THREE.SphereGeometry(0.06), new THREE.MeshBasicMaterial({ color: 0x00f2ff }));
                marker.position.copy(hits[0].point);
                markerGroup.add(marker);
                
                let name = hits[0].object.name.replace(/Left foot - |Right foot - |_/gi, " ").trim();
                sendUpdate(name || "Surface");
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
