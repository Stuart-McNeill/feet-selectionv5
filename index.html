<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Engine v5</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0c; }
        canvas { display: block; touch-action: none; }
        /* Ensure no UI from the original webpage shows up */
        #ui-layer, .panel, .controls, #coords, button { display: none !important; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, leftFoot, rightFoot, currentFoot;
        let isRotating = false;
        let markerGroup = new THREE.Group();

        const modelUrls = {
            left: "https://stuart-mcneill.github.io/3Dfootselection/Leftfoot.glb",
            right: "https://stuart-mcneill.github.io/feet-selection/RightFoot.glb"
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0c);
            scene.add(markerGroup);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.2, 4.5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            const loader = new THREE.GLTFLoader();
            
            // Load Left
            loader.load(modelUrls.left, (gltf) => {
                leftFoot = gltf.scene;
                leftFoot.visible = false;
                scene.add(leftFoot);
            });

            // Load Right
            loader.load(modelUrls.right, (gltf) => {
                rightFoot = gltf.scene;
                rightFoot.visible = false;
                scene.add(rightFoot);
            });

            animate();
        }

        // --- Region Mapping Logic (Restored) ---
        function formatRegionName(rawName) {
            if (!rawName) return "Unknown";
            // Cleans "Left_foot_-_Heel_01" -> "Heel"
            return rawName
                .replace(/Left foot - |Right foot - /gi, "")
                .replace(/_/g, " ")
                .replace(/[0-9]/g, "")
                .trim();
        }

        // --- App Interface ---
        window.handleMobileCommand = (json) => {
            const data = JSON.parse(json);
            switch(data.action) {
                case 'SELECT':
                    if (!leftFoot || !rightFoot) return;
                    leftFoot.visible = (data.side === 'left');
                    rightFoot.visible = (data.side === 'right');
                    currentFoot = (data.side === 'left') ? leftFoot : rightFoot;
                    clearMarkers();
                    break;
                case 'ROTATE':
                    isRotating = !isRotating;
                    break;
                case 'UNDO':
                    if (markerGroup.children.length > 0) {
                        markerGroup.remove(markerGroup.children[markerGroup.children.length - 1]);
                        sendUpdate();
                    }
                    break;
                case 'CLEAR':
                    clearMarkers();
                    break;
            }
        };

        function clearMarkers() {
            while(markerGroup.children.length > 0) markerGroup.remove(markerGroup.children[0]);
            sendUpdate();
        }

        function sendUpdate(regionName = "None") {
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({
                    count: markerGroup.children.length,
                    region: regionName
                }));
            }
        }

        // --- Interaction ---
        window.addEventListener('click', (e) => {
            if (!currentFoot) return;
            const mouse = new THREE.Vector2(
                (e.clientX / window.innerWidth) * 2 - 1,
                -(e.clientY / window.innerHeight) * 2 + 1
            );
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(currentFoot, true);

            if (hits.length > 0) {
                const hit = hits[0];
                const marker = new THREE.Mesh(
                    new THREE.SphereGeometry(0.06),
                    new THREE.MeshBasicMaterial({ color: 0x00f2ff })
                );
                marker.position.copy(hit.point);
                markerGroup.add(marker);
                
                const cleanName = formatRegionName(hit.object.name);
                sendUpdate(cleanName);
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if (isRotating && currentFoot) {
                currentFoot.rotation.y += 0.01;
                markerGroup.rotation.y += 0.01;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
